<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lector QR</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Librería buena -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="js/index.js" async defer></script>
</head>

<body>
  <div class="container text-center mt-5">
    <h4>Escanear código QR</h4>

    <div id="reader" style="width:300px; margin:auto;"></div>

    <div class="mt-3">
      <button id="btn-start" class="btn btn-success btn-sm">Encender cámara</button>
      <button id="btn-stop" class="btn btn-danger btn-sm">Detener cámara</button>
    </div>
  </div>

  <audio id="audioScaner" src="audio/navi.mp3"></audio>
</body>
</html>
